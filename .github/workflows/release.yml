name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Verify tag matches package version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          test "$TAG" = "v$(node -p "require('./package.json').version")"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          flags=(--title "$TAG" --generate-notes)
          if [[ "$TAG" == *-* ]]; then
            flags+=(--prerelease)
          fi
          # Re-pushing a tag re-runs this job; replace any existing release so its
          # notes and target commit track the current tag instead of failing.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" --yes
          fi
          gh release create "$TAG" "${flags[@]}"
